name: Keep Streamlit App Awake

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  ping_job:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        # Replace the URL below with your actual Streamlit URL
        run: curl -I https://plantpathologydiagnosis.streamlit.app
